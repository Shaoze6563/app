name: Build Focus (macOS 12 compatible)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          XC=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then XC=/Applications/Xcode.app; fi
          echo "Using $XC"
          sudo xcode-select -s "$XC"
          xcodebuild -version

      - name: Build (deployment target 12.0, unsigned)
        run: |
          xcodebuild \
            -project Focus.xcodeproj \
            -target Focus \
            -configuration Release \
            MACOSX_DEPLOYMENT_TARGET=12.0 \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="$PWD/out" \
            build

      - name: Ad-hoc sign the app
        run: |
          APP="out/Focus.app"
          codesign --force --deep --sign - "$APP"
          codesign -dv "$APP" || true
          /usr/libexec/PlistBuddy -c "Print :LSMinimumSystemVersion" "$APP/Contents/Info.plist" || true

      - name: Zip the app
        run: |
          cd out
          ditto -c -k --sequesterRsrc --keepParent Focus.app Focus-macOS12.zip

      - name: Upload built app
        uses: actions/upload-artifact@v4
        with:
          name: Focus-macOS12
          path: out/Focus-macOS12.zip
